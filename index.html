<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&display=swap');
:root{
  --bg:#060b12;--panel:#0b1219;--p2:#10181f;--bd:#172030;
  --ac:#00e5ff;--gr:#00ff88;--yw:#ffd60a;--rd:#ff3d5a;--pu:#b388ff;
  --mu:#2a4055;--tx:#7090a8;--br:#dde8f0;--fn:'JetBrains Mono','Courier New',monospace;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{font-family:var(--fn);background:var(--bg);color:var(--tx);min-height:100vh;overscroll-behavior:none}
#app{max-width:480px;margin:0 auto;padding:0 0 60px}

/* ── BOTTOM NAV ── */
#nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:var(--panel);border-top:1px solid var(--bd);display:flex;z-index:200}
.nav-btn{flex:1;padding:10px 4px 8px;background:none;border:none;color:var(--mu);font-family:var(--fn);font-size:8px;letter-spacing:1px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px}
.nav-btn .ni{font-size:18px;line-height:1}
.nav-btn.on{color:var(--ac)}.nav-btn.on .ni{filter:drop-shadow(0 0 4px var(--ac))}

/* ── HEADER ── */
#hdr{background:var(--panel);border-bottom:1px solid var(--bd);padding:10px 12px;position:sticky;top:0;z-index:100}
.hdr-row{display:flex;justify-content:space-between;align-items:center}
.logo{font-size:16px;font-weight:700;color:var(--br);letter-spacing:2px}
.logo .g{color:var(--ac)}
.hdr-stats{font-size:9px;color:var(--mu);text-align:right}

/* ── TABS CONTENT ── */
.tc{display:none;padding:12px}
.tc.on{display:block}

/* ── SECTION ── */
.sec{background:var(--panel);border:1px solid var(--bd);border-radius:7px;padding:12px;margin-bottom:10px}
.stitle{font-size:9px;letter-spacing:3px;color:var(--mu);text-transform:uppercase;margin-bottom:9px}

/* ── KV ── */
.kv{display:flex;justify-content:space-between;align-items:center;padding:4px 0;border-bottom:1px solid var(--bd);font-size:10px}
.kv .k{color:var(--mu);letter-spacing:1px}.kv .v{color:var(--tx)}

/* ── TAG ── */
.tag{display:inline-block;padding:2px 7px;border-radius:3px;font-size:9px;letter-spacing:1px;margin:2px}

/* ── INPUTS ── */
input,select,textarea{background:var(--bg);border:1px solid var(--bd);border-radius:4px;padding:7px 9px;color:var(--br);font-family:var(--fn);font-size:12px;outline:none;width:100%;transition:border-color .15s}
input:focus,select:focus,textarea:focus{border-color:var(--ac)}
textarea{resize:vertical;min-height:60px;font-size:11px;line-height:1.5}

/* ── UPLOAD ── */
#upload-zone{border:1.5px dashed var(--ac);border-radius:10px;padding:26px 16px;text-align:center;cursor:pointer;background:linear-gradient(135deg,#00e5ff08,transparent);position:relative;transition:all .2s;margin-bottom:10px}
#upload-zone.drag{background:#00e5ff14;border-color:#00e5ffcc}
#upload-zone input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}

/* ── BUTTONS ── */
.btn{width:100%;padding:11px;border-radius:5px;font-family:var(--fn);font-weight:700;font-size:11px;letter-spacing:2px;cursor:pointer;border:none}
.btn-ac{background:var(--ac);color:#000}
.btn-out{background:transparent;border:1px solid var(--ac)55;color:var(--ac)}
.btn-pu{background:transparent;border:1px solid var(--pu)55;color:var(--pu)}
.btn-sm{padding:4px 9px;background:none;border:1px solid var(--bd);border-radius:3px;color:var(--mu);font-family:var(--fn);font-size:9px;cursor:pointer}
.btn-win{padding:5px 12px;background:#00ff8822;border:1px solid #00ff8866;border-radius:3px;color:var(--gr);font-family:var(--fn);font-size:10px;cursor:pointer}
.btn-loss{padding:5px 12px;background:#ff3d5a22;border:1px solid #ff3d5a66;border-radius:3px;color:var(--rd);font-family:var(--fn);font-size:10px;cursor:pointer}

/* ── VERDICT ── */
.v-badge{display:inline-block;padding:8px 32px;border-radius:5px;font-size:22px;font-weight:700;letter-spacing:5px;margin-bottom:8px}

/* ── GRID ── */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}

/* ── TRADE CARD ── */
.trade-card{background:var(--panel);border:1px solid var(--bd);border-radius:5px;padding:11px;margin-bottom:8px}
.trade-card.win{border-color:#00ff8844}.trade-card.loss{border-color:#ff3d5a44}

/* ── STAT BOX ── */
.stat-b{background:var(--p2);border-radius:4px;padding:10px 6px;text-align:center}
.sv{font-size:18px;font-weight:700;margin-bottom:2px}
.sl{font-size:8px;color:var(--mu);letter-spacing:2px}

/* ── ORACLE ── */
.o-card{background:var(--p2);border:1px solid var(--bd);border-radius:5px;padding:11px;margin-bottom:8px}
.o-title{font-size:11px;color:var(--br);font-weight:700;line-height:1.4;margin-bottom:4px}
.o-sum{font-size:10px;color:var(--tx);line-height:1.6;margin-bottom:7px}
.bayes-row{display:flex;justify-content:space-between;align-items:center;background:var(--bg);border:1px solid var(--bd);border-radius:3px;padding:6px 8px;margin-bottom:4px}

/* ── PROG / SPIN ── */
.prog{height:2px;background:var(--bd);border-radius:1px;overflow:hidden}
.prog-f{height:100%;background:linear-gradient(90deg,var(--ac),var(--pu));border-radius:1px;transition:width .4s}
.spin{display:inline-block;width:16px;height:16px;border:2px solid var(--ac)33;border-top-color:var(--ac);border-radius:50%;animation:spin .8s linear infinite}
.pulse{display:inline-block;width:7px;height:7px;background:var(--gr);border-radius:50%;animation:pulse 1.5s infinite}

/* ── EXT LINK ── */
.el{display:inline-block;padding:4px 8px;background:var(--ac)0e;border:1px solid var(--ac)2a;border-radius:3px;font-size:9px;color:var(--ac);text-decoration:none;margin:2px;letter-spacing:1px}
.el-pu{border-color:var(--pu)2a;color:var(--pu)}

/* ── INSTALL ── */
#inst{display:none;background:#00ff8818;border:1px solid #00ff8855;border-radius:5px;padding:9px 12px;margin:10px 12px 0;align-items:center;justify-content:space-between;gap:8px;font-size:10px;color:var(--br)}
#inst button{background:var(--gr);color:#000;border:none;border-radius:3px;padding:5px 12px;font-family:var(--fn);font-weight:700;font-size:10px;cursor:pointer}

/* ── RANK TABLE ── */
.rtab{width:100%;border-collapse:collapse;font-size:10px}
.rtab th{color:var(--mu);text-align:left;padding:3px 5px;border-bottom:1px solid var(--bd);font-size:8px;letter-spacing:1px}
.rtab td{padding:4px 5px;border-bottom:1px solid var(--bd)55;color:var(--tx)}
.rn{color:var(--ac);font-weight:700;width:22px}

/* ── ANIM ── */
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.fade{animation:fadeUp .3s ease}

::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:var(--bd);border-radius:2px}
</style>

<body>
<div id="app">

<div id="inst"><span>📲 홈화면에 추가 가능</span><button onclick="doInstall()">설치</button></div>

<script>
/* ══════════════════════════════════════
   SHARED STATE & STORAGE
══════════════════════════════════════ */
let trades=[], cal={}, pendingBayes=[], bankroll=500, deferredPrompt=null;
let currentImg=null, currentTradeId=null;

const LS = {
  get:(k,def)=>{try{return JSON.parse(localStorage.getItem(k))||def}catch{return def}},
  set:(k,v)=>localStorage.setItem(k,JSON.stringify(v)),
  raw:(k,def='')=>localStorage.getItem(k)||def,
  rawSet:(k,v)=>localStorage.setItem(k,v),
};

function loadAll(){
  trades=LS.get('pm-trades',[]);
  cal=LS.get('pm-cal',{});
  pendingBayes=LS.get('pm-bayes',[]);
  bankroll=parseInt(LS.raw('pm-bank','500'));
}
function saveAll(){
  LS.set('pm-trades',trades);
  LS.set('pm-cal',cal);
  LS.set('pm-bayes',pendingBayes);
}

/* ══════════════════════════════════════
   MATH ENGINE
══════════════════════════════════════ */
const DB={
  sinner:{name:"Jannik Sinner",rank:1,nat:"🇮🇹",clay:92,hard:88,grass:74,inj:null},
  alcaraz:{name:"Carlos Alcaraz",rank:2,nat:"🇪🇸",clay:88,hard:85,grass:90,inj:"손목"},
  zverev:{name:"Alexander Zverev",rank:3,nat:"🇩🇪",clay:82,hard:80,grass:68,inj:null},
  djokovic:{name:"Novak Djokovic",rank:4,nat:"🇷🇸",clay:88,hard:87,grass:86,inj:"어깨"},
  medvedev:{name:"Daniil Medvedev",rank:9,nat:"🇷🇺",clay:74,hard:84,grass:72,inj:null},
  swiatek:{name:"Iga Swiatek",rank:1,nat:"🇵🇱",clay:94,hard:82,grass:72,inj:null},
  sabalenka:{name:"Aryna Sabalenka",rank:2,nat:"🇧🇾",clay:84,hard:90,grass:78,inj:null},
  gauff:{name:"Coco Gauff",rank:3,nat:"🇺🇸",clay:80,hard:82,grass:76,inj:null},
  andreeva:{name:"Mirra Andreeva",rank:9,nat:"🇷🇺",clay:82,hard:76,grass:68,inj:null},
};

function findP(name){
  if(!name)return null;
  const n=name.toLowerCase();
  return Object.values(DB).find(p=>n.includes(p.name.split(" ").pop().toLowerCase())||p.name.toLowerCase().includes(n));
}

function tennisEst(p1n,p2n,surf){
  const p1=findP(p1n),p2=findP(p2n);
  if(!p1||!p2)return null;
  const s=surf||"clay";
  let b=p1[s]/(p1[s]+p2[s])*100+(p2.rank-p1.rank)*0.15;
  if(p1.inj)b-=8;if(p2.inj)b+=8;
  return Math.min(Math.max(b,5),95);
}

function calcEV(p,price){return{ev:p*(1-price)-(1-p)*price,roi:(p*(1-price)-(1-p)*price)/price*100}}

function calcKelly(p,price,bank){
  const b=(1-price)/price,fk=(p*b-(1-p))/b;
  if(fk<=0)return null;
  const adj=Math.min(fk*0.25,0.05),bet=bank*adj;
  return{fk:(fk*100).toFixed(1),adj:(adj*100).toFixed(1),bet:bet.toFixed(0),ct:Math.floor(bet/price),profit:(Math.floor(bet/price)*(1-price)).toFixed(0)};
}

function bayesChain(prior,items){
  let p=prior/100; const log=[];
  for(const it of(items||[])){
    if(!it.label||!it.pT||!it.pF)continue;
    const prev=p,num=(parseFloat(it.pT)/100)*p;
    p=num/(num+(parseFloat(it.pF)/100)*(1-p));
    log.push({label:it.label,from:(prev*100).toFixed(1),to:(p*100).toFixed(1),lr:(it.pT/it.pF).toFixed(2)});
  }
  return{prob:p,log};
}

function zone(price){
  if(price<0.05)return{l:"극단위험",c:"#ff2255",skip:true};
  if(price<0.10)return{l:"위험",c:"#ff4466",skip:true};
  if(price<0.30)return{l:"주의",c:"#ffd60a",skip:false};
  if(price<0.70)return{l:"적정",c:"#00ff88",skip:false};
  if(price<0.90)return{l:"양호",c:"#00ff88",skip:false};
  return{l:"근확실성",c:"#00e5ff",skip:false};
}

function getCalBias(sport,surf){
  const key=`${sport||"other"}_${surf||"any"}`;
  const d=cal[key];
  if(!d||d.total<5)return 0;
  return((d.wins/d.total)-(d.sumProb/d.total))*100;
}

function runAnalysis(price,prior,bayesItems,bank){
  const allItems=[...(bayesItems||[]),...pendingBayes];
  const{prob,log}=bayesChain(prior,allItems);
  const{ev,roi}=calcEV(prob,price);
  const kl=ev>0?calcKelly(prob,price,bank||bankroll):null;
  const z=zone(price);
  let verdict,vc;
  if(z.skip||ev<=0){verdict="SKIP";vc=C.rd}
  else if(ev<0.03){verdict="WAIT";vc=C.yw}
  else{verdict="BUY";vc=C.gr}
  return{prob,log,ev,roi,kl,z,verdict,vc,price,prior};
}

const C={ac:"#00e5ff",gr:"#00ff88",yw:"#ffd60a",rd:"#ff3d5a",pu:"#b388ff",mu:"#2a4055",tx:"#7090a8",br:"#dde8f0"};

/* ══════════════════════════════════════
   CLAUDE API
══════════════════════════════════════ */
function getKey(){return LS.raw('pm-apikey')}

async function claude(messages,tools=[],max=1500){
  const key=getKey();
  if(!key)throw new Error("API 키 없음 — 설정에서 입력");
  const body={model:"claude-opus-4-5",max_tokens:max,messages};
  if(tools.length)body.tools=tools;
  const r=await fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",headers:{"Content-Type":"application/json","x-api-key":key,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
    body:JSON.stringify(body)
  });
  const d=await r.json();
  if(d.error)throw new Error(d.error.message);
  return d;
}

async function scanImage(b64,mime){
  const sys=`Analyze this screenshot and respond ONLY with valid JSON (no markdown):
{"market_name":"string","sport":"tennis|baseball|basketball|soccer|geopolitics|crypto|other","yes_price":number_or_null,"volume_24h":"string_or_null","live":bool,"player1":"string_or_null","player2":"string_or_null","score_p1":"string_or_null","score_p2":"string_or_null","set_score":"string_or_null","current_game":"string_or_null","tournament":"string_or_null","surface":"clay|hard|grass|null","round":"Final|SF|QF|R16|R32|null","win_prob_p1":number_or_null,"injury_info":"string_or_null","situation_ko":"2-3 Korean sentences","edge_ko":"1-2 Korean sentences","bayes_items":[{"label":"Korean","pT":number,"pF":number}],"recommended":"YES|NO|WAIT|SKIP","confidence":"HIGH|MEDIUM|LOW"}`;
  const d=await claude([{role:"user",content:[{type:"image",source:{type:"base64",media_type:mime,data:b64}},{type:"text",text:"분석해주세요."}]}],[],1200);
  const raw=d.content?.find(c=>c.type==="text")?.text||"{}";
  try{return JSON.parse(raw.replace(/```json|```/g,"").trim())}catch{return null}
}

async function fetchOracle(query){
  const prompt=query
    ?`Search Oracle by Polymarket articles about: "${query}" from news.polymarket.com`
    :`Search the 4 most recent articles from news.polymarket.com Oracle newsletter`;
  const d=await claude([{role:"user",content:prompt+`
Return ONLY JSON array (no markdown):
[{"title":"string","date":"string","url":"https://news.polymarket.com/p/...","tag":"Korean tag","summary_ko":"2-3 Korean sentences","key_insight_ko":"1 Korean sentence","polymarket_links":[{"q":"market question","url":"poly.market/..."}],"bayes_items":[{"label":"Korean","pT":number,"pF":number}],"sentiment":"bullish|bearish|neutral"}]`}],
    [{type:"web_search_20250305",name:"web_search"}],2500);
  const texts=d.content?.filter(c=>c.type==="text").map(c=>c.text).join("")||"";
  const m=texts.match(/\[[\s\S]*?\]/);
  if(!m)return[];
  try{return JSON.parse(m[0])}catch{return[]}
}

/* ══════════════════════════════════════
   TRADE MANAGEMENT
══════════════════════════════════════ */
function saveTrade(data){
  const id=Date.now();
  trades.unshift({id,ts:new Date().toISOString(),...data,outcome:null,pnl:null});
  saveAll();
  currentTradeId=id;
  updateHeader();
  document.getElementById('log-cnt').textContent=trades.length;
  return id;
}

function markOutcome(id,won){
  const t=trades.find(x=>x.id===id);
  if(!t||t.outcome)return;
  const price=t.price||0.5, bet=parseFloat(t.bet||0);
  t.outcome=won?"WIN":"LOSS";
  t.pnl=won?parseFloat((bet/price*(1-price)).toFixed(2)):-bet;
  // Update calibration
  const key=`${t.sport||"other"}_${t.surface||"any"}`;
  if(!cal[key])cal[key]={total:0,wins:0,sumProb:0};
  cal[key].total++;cal[key].wins+=(won?1:0);cal[key].sumProb+=(t.myProb||0.5);
  saveAll();updateHeader();
  toast(won?`✅ WIN +$${t.pnl}`:`❌ LOSS -$${Math.abs(t.pnl)}`,won?C.gr:C.rd);
  renderLog();renderCalTab();
}

function delTrade(id){trades=trades.filter(x=>x.id!==id);saveAll();updateHeader();renderLog()}

/* ══════════════════════════════════════
   BAYES POOL
══════════════════════════════════════ */
function addBayes(label,pT,pF){
  if(pendingBayes.find(b=>b.label===label)){toast("이미 추가됨",C.yw);return}
  pendingBayes.push({label,pT:String(pT),pF:String(pF)});
  saveAll();updateBayesBadge();
  toast(`⟳ "${label.substring(0,22)}..." 추가됨`,C.pu);
}
function clearBayes(){pendingBayes=[];saveAll();updateBayesBadge()}
function updateBayesBadge(){
  const b=document.getElementById('bayes-badge');
  if(b)b.textContent=pendingBayes.length?`⟳ 베이즈 ${pendingBayes.length}개 대기`:'';
}

/* ══════════════════════════════════════
   UI HELPERS
══════════════════════════════════════ */
function kv(k,v,vc=""){return`<div class="kv"><span class="k">${k}</span><span class="v" style="color:${vc||C.tx};font-weight:${vc?700:400}">${v}</span></div>`}
function tag(t,c){return`<span class="tag" style="background:${c}1a;border:1px solid ${c}44;color:${c}">${t}</span>`}
function el(label,href,c=C.ac){return`<a href="${href}" target="_blank" class="el" style="border-color:${c}2a;color:${c}">${label}</a>`}

function toast(msg,color=C.ac){
  const t=document.createElement("div");
  t.style.cssText=`position:fixed;top:16px;left:50%;transform:translateX(-50%);background:var(--panel);border:1px solid ${color};border-radius:6px;padding:9px 16px;font-family:var(--fn);font-size:11px;color:${color};z-index:9999;letter-spacing:1px;white-space:nowrap;animation:fadeUp .3s ease;pointer-events:none`;
  t.textContent=msg;document.body.appendChild(t);setTimeout(()=>t.remove(),2500);
}

function updateHeader(){
  const res=trades.filter(t=>t.outcome);
  const wins=res.filter(t=>t.outcome==="WIN").length;
  const pnl=res.reduce((a,t)=>a+(t.pnl||0),0);
  const wr=res.length?Math.round(wins/res.length*100)+"%":"--";
  const we=document.getElementById('s-wr');if(we){we.textContent=wr;we.style.color=wins>res.length*0.55?C.gr:C.tx}
  const pe=document.getElementById('s-pnl');if(pe){pe.textContent=(pnl>=0?"+":"")+pnl.toFixed(1);pe.style.color=pnl>=0?C.gr:C.rd}
}

function onFile(e){processFile(e.target.files[0])}

async function processFile(file){
  if(!file?.type.startsWith('image/'))return;
  if(!getKey()){toast("API 키를 먼저 입력하세요",C.rd);return}
  const reader=new FileReader();
  reader.onload=async e=>{
    currentImg=e.target.result;
    document.getElementById('tab-scan').innerHTML=`<div style="padding:12px;text-align:center;padding-top:40px">
      <img src="${currentImg}" style="width:100%;max-height:140px;object-fit:cover;border-radius:7px;margin-bottom:16px;border:1px solid var(--bd)">
      <div class="spin"></div>
      <div style="font-size:11px;color:${C.ac};letter-spacing:2px;margin:12px 0 5px">AI 분석 중...</div>
      <div style="font-size:10px;color:var(--mu);margin-bottom:12px">Claude Vision이 경기를 읽고 있습니다</div>
      <div class="prog" style="max-width:200px;margin:0 auto"><div class="prog-f" id="scan-prog" style="width:15%"></div></div>
    </div>`;
    try{
      setP(40);
      const ai=await scanImage(currentImg.split(",")[1],file.type);
      setP(75);
      if(!ai)throw new Error("AI 응답 없음");
      const price=ai.yes_price;
      const tEst=tennisEst(ai.player1,ai.player2,ai.surface);
      const calBias=getCalBias(ai.sport,ai.surface);
      const rawPrior=ai.win_prob_p1??tEst??(price?price*100:null);
      const prior=rawPrior?Math.min(Math.max(rawPrior+calBias,5),95):null;
      let analysis=null;
      if(price&&price>0&&price<1&&prior){
        analysis=runAnalysis(price,prior,ai.bayes_items,bankroll);
        analysis.tEst=tEst;analysis.calBias=calBias;
      }
      const tradeId=price?saveTrade({
        market:ai.market_name||"Unknown",sport:ai.sport,surface:ai.surface,
        player1:ai.player1,player2:ai.player2,tournament:ai.tournament,
        price,myProb:analysis?.prob,ev:analysis?.ev,verdict:analysis?.verdict,
        bet:analysis?.kl?.bet||"0",calBias
      }):null;
      setP(100);
      setTimeout(()=>renderScanResult(ai,analysis,tradeId),200);
    }catch(err){
      document.getElementById('tab-scan').innerHTML=`<div style="padding:12px">
        <div class="sec" style="border-color:${C.rd}44">
          <div style="font-size:11px;color:${C.rd};margin-bottom:8px">⚠ 오류: ${err.message}</div>
          <button class="btn btn-out" onclick="renderScanUpload()">다시 시도</button>
        </div>
      </div>`;
    }
  };
  reader.readAsDataURL(file);
}

  const n=parseFloat(v);if(!n||isNaN(n))return null;
  if(fmt==='d')return n>1?1/n:null;
  if(fmt==='a'){if(n>0)return 100/(n+100);if(n<0)return Math.abs(n)/(Math.abs(n)+100);return null}
  return null;
}

let consensusP1=null;
function recalcOdds(){
  const rows=document.querySelectorAll('.bk-r');
  const entries=[];
  let bestP=0,bestName='',bestOdds=0;
  rows.forEach(row=>{
    const p1=o2p(row.querySelector('.bk-p1')?.value,oddsFmt);
    const p2=o2p(row.querySelector('.bk-p2')?.value,oddsFmt);
    const name=row.querySelector('.bk-n')?.value||'';
    if(!p1||!p2)return;
    const tot=p1+p2,p1n=p1/tot,margin=(tot-1)*100;
    entries.push({name,p1n,margin});
    if(p1n>bestP){bestP=p1n;bestName=name;bestOdds=row.querySelector('.bk-p1')?.value}
  });
  const res=document.getElementById('odds-res');
  if(!entries.length){res.style.display='none';consensusP1=null;return}
  const avg=entries.reduce((a,e)=>a+e.p1n,0)/entries.length;
  const avgM=entries.reduce((a,e)=>a+e.margin,0)/entries.length;
  consensusP1=avg;
  const pm=parseFloat(document.getElementById('e-price')?.value)||null;
  const edgePct=pm?((avg-pm)*100).toFixed(1):null;
  const ec=edgePct>2?C.gr:edgePct>0?C.yw:C.rd;
  res.style.display='block';
  res.innerHTML=`<div class="g2" style="margin-bottom:8px">
    <div>${kv("컨센서스",`<b style="color:${C.ac}">${(avg*100).toFixed(1)}%</b>`)}${kv("마켓 마진",avgM.toFixed(2)+"%")}</div>
    <div>${kv("최고 배당",bestName||"--")}${kv("",bestOdds)}</div>
  </div>
  ${pm?`<div style="padding:7px;background:${ec}18;border:1px solid ${ec}44;border-radius:4px;display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
    <span style="font-size:10px;color:${ec}">${edgePct>0?"폴리마켓 저평가 → BUY":"폴리마켓 고평가 → SKIP"}</span>
    <span style="font-size:14px;font-weight:700;color:${ec}">${edgePct>0?"+":""}${edgePct}%p</span>
  </div>`:''}
  <button onclick="applyConsensus()" style="width:100%;padding:7px;background:${C.pu}18;border:1px solid ${C.pu}44;border-radius:3px;color:${C.pu};font-family:var(--fn);font-size:9px;letter-spacing:1px;cursor:pointer">📊 컨센서스 확률을 분석에 적용</button>`;
}

function runEdge(){
  const price=parseFloat(document.getElementById('e-price').value);
  const bank=parseFloat(document.getElementById('e-bank').value)||bankroll;
  const mkt=document.getElementById('e-mkt').value;
  if(!price||price<=0||price>=1){toast("가격을 입력하세요",C.yw);return}
  const calBias=getCalBias(document.getElementById('e-cat').value,null);
  const prior=Math.min(Math.max(price*100+calBias,1),99);
  const an=runAnalysis(price,prior,edgeNewsList,bank);
  edgeResult={...an,mkt,calBias};
  const{prob,log,ev,roi,kl,z,verdict,vc}=an;

        <div style="font-size:9px;color:${bc};margin-top:4px">${Math.abs(bias)<2?"✓ 보정 불필요":bias>0?`↑ +${bias.toFixed(1)}%p 상향 적용 중`:`↓ ${bias.toFixed(1)}%p 하향 적용 중`}</div>
      </div>`;
    }).join("")}
    </div>

    <!-- Pending Bayes -->
    ${pendingBayes.length?`<div class="sec" style="border-color:${C.pu}44">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
        <div class="stitle" style="margin:0;color:${C.pu}">⟳ Oracle 베이즈 대기</div>
        <button onclick="clearBayes();renderCalTab()" class="btn-sm" style="color:${C.rd};border-color:${C.rd}33">전체삭제</button>
      </div>
      ${pendingBayes.map((b,i)=>`<div class="bayes-row"><div style="flex:1"><div style="font-size:10px;color:var(--br)">${b.label}</div><div style="font-size:9px;color:${C.mu}">P(YES)=${b.pT}% · P(NO)=${b.pF}% · LR=${(b.pT/b.pF).toFixed(2)}</div></div><button onclick="pendingBayes.splice(${i},1);saveAll();updateBayesBadge();renderCalTab()" style="background:none;border:none;color:${C.mu};cursor:pointer;font-family:var(--fn)">✕</button></div>`).join('')}
    </div>`:''}

    <!-- Settings -->
    <div class="sec">
      <div class="stitle">⚙️ 설정</div>
      <div style="font-size:9px;color:${C.mu};margin-bottom:3px">Claude API Key</div>
      <div style="display:flex;gap:6px;margin-bottom:4px">
        <input type="password" id="cfg-key" value="${getKey()}" placeholder="sk-ant-..." style="font-size:11px">
        <button onclick="saveKeyCfg()" style="padding:7px 12px;background:${C.ac};color:#000;border:none;border-radius:4px;font-family:var(--fn);font-weight:700;font-size:10px;cursor:pointer;white-space:nowrap">저장</button>
      </div>
      <div id="cfg-st" style="font-size:9px;color:${getKey()?C.gr:C.rd};margin-bottom:8px">${getKey()?'✓ 설정됨':'⚠ 미설정'}</div>
      <div style="font-size:9px;color:${C.mu};margin-bottom:3px">잔고 (USDC)</div>
      <input type="number" value="${bankroll}" onchange="bankroll=+this.value;LS.rawSet('pm-bank',bankroll)" style="max-width:120px;text-align:center">
    </div>
  </div>`;
  document.getElementById('tab-cal').innerHTML=h;
}
function saveKeyCfg(){
  const v=document.getElementById('cfg-key')?.value.trim();
  if(v){LS.rawSet('pm-apikey',v);document.getElementById('cfg-st').textContent='✓ 저장됨';document.getElementById('cfg-st').style.color=C.gr;toast("API 키 저장됨",C.gr)}
}

/* ══════════════════════════════════════
   PWA
══════════════════════════════════════ */
window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();deferredPrompt=e;document.getElementById('inst').style.display='flex'});
function doInstall(){if(!deferredPrompt)return;deferredPrompt.prompt();deferredPrompt.userChoice.then(()=>{deferredPrompt=null;document.getElementById('inst').style.display='none'})}

/* ══════════════════════════════════════
   INIT
══════════════════════════════════════ */
loadAll();
updateHeader();
updateBayesBadge();
document.getElementById('log-cnt').textContent=trades.length;
renderScanUpload();
</script>
</body>
</html>
